{% load allauth %}
{% for err in attrs.form.non_field_errors %}<div role="alert" class="text-error">{{ err }}</div>{% endfor %}

<form method="{{ attrs.method }}"
    class="space-y-2"
    {% if attrs.action %}action="{{ attrs.action }}"{% endif %}>
    {% slot body %}
    {% endslot %}
    <div class="flex gap-2 my-4 items-center justify-start">
        {% slot actions %}
        {% endslot %}
    </div>
</form>
