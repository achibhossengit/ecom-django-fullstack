{% extends "core/layouts/manager_dashboard.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Image placeholder -->
    <div class="w-full h-40 bg-gray-100 flex items-center justify-center mb-4">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmTMIKaSVQHxmnV45ePv8AHPSmsukdMSiY8w&s"
             alt="Category Image" 
             class="object-cover h-full w-full">
    </div>

    <!-- Header -->
    <h2 class="text-2xl font-bold mb-3">Delete Category</h2>

    <!-- Warning message -->
    <p class="text-gray-700 mb-4">
        You are about to permanently delete <strong>{{ category.name }}</strong>.  
        <span class="text-error font-semibold">{{ category.product_count }}</span> related products will also be removed.
        <span class="font-semibold text-error">This action cannot be undone.</span>  
    </p>

    <!-- Action buttons -->
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-between gap-4 mt-6">
            <a href="{% url 'category_detail' category.pk %}" 
               class="btn btn-ghost btn-outline">
                Cancel
            </a>
            <button type="submit" class="btn btn-error">
                Confirm Delete
            </button>
        </div>
    </form>
</div>
{% endblock content %}
