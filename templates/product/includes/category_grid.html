<!-- Category grid -->
<div class="py-24 bg-warm-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Grid -->
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4" style="grid-template-rows: auto auto;">
      {% for category in categories %}
        {% include 'product/includes/category_card.html' with category=category is_large=forloop.first %}
      {% endfor %}
    </div>
  </div>
</div>
