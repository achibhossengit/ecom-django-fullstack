{% if messages %}
  <div id="flash-messages" class="fixed top-16 z-50 space-y-2 right-4">
    {% for message in messages %}
      <div class="alert shadow-lg transition-opacity duration-500
                  {% if message.tags == 'success' %}
                    alert-success
                  {% elif message.tags == 'error' %}
                    alert-error
                  {% elif message.tags == 'warning' %}
                    alert-warning
                  {% else %}
                    alert-info
                  {% endif %}">
        <span>{{ message }}</span>
      </div>
    {% endfor %}
  </div>

  <script>
    // Auto-hide after 3 seconds
    setTimeout(function() {
      const flash = document.getElementById('flash-messages');
      if (flash) {
        flash.style.opacity = '0';
        setTimeout(() => flash.remove(), 500); // remove after fade-out
      }
    }, 3000);
  </script>
{% endif %}
