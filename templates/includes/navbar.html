<header class="bg-warm-white sticky top-0 z-50" style="border-bottom: 1px solid var(--sand-dark);">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      {% include 'includes/logo.html' with color='text-black' %}

      <!-- Nav links (desktop) -->
      <nav class="hidden md:flex items-center gap-8">
        <a href="/" class="text-sm font-medium hover:text-coral transition-colors" style="color:var(--ink);">Home</a>
        <a href="/products/" class="text-sm font-medium hover:text-coral transition-colors" style="color:var(--ink);">Shop</a>
        <a href="/categories/" class="text-sm font-medium hover:text-coral transition-colors" style="color:var(--ink);">Categories</a>
        <a href="#" class="text-sm font-medium hover:text-coral transition-colors" style="color:var(--ink);">Deals</a>
        <a href="#" class="text-sm font-medium hover:text-coral transition-colors" style="color:var(--ink);">About</a>
      </nav>

      <!-- Right actions -->
      <div class="flex items-center gap-4">
        <!-- Search (desktop) -->
        <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full text-sm" style="background:var(--sand); color:var(--muted);">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Search products…" class="bg-transparent outline-none w-full text-sm" style="color:var(--ink);" />
        </div>

        <!-- Wishlist -->
        <button class="hidden md:flex items-center justify-center w-9 h-9 rounded-full hover:bg-sand transition-colors cursor-pointer" aria-label="Wishlist">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </button>

        <!-- Cart -->
        <a href="#" class="relative flex items-center justify-center w-9 h-9 rounded-full bg-coral text-white hover:bg-coral-dark transition-colors" aria-label="Cart">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full text-xs font-bold flex items-center justify-center bg-ink text-white">3</span>
        </a>

        <!-- Profile -->
        <a href="/profile/" class="relative flex items-center justify-center w-9 h-9 rounded-full bg-coral text-white hover:bg-coral-dark transition-colors" aria-label="Profile">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
          </svg>
        </a>

        <!-- Hamburger (mobile) -->
        <button id="menu-btn" class="md:hidden flex items-center justify-center w-9 h-9 rounded-full hover:bg-sand" aria-label="Menu">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 pt-2" style="border-top: 1px solid var(--sand-dark); background: var(--warm-white);">
    <nav class="flex flex-col gap-3">
      <a href="/" class="text-sm font-medium py-2 hover:text-coral transition-colors">Home</a>
      <a href="/products/" class="text-sm font-medium py-2 hover:text-coral transition-colors">Shop</a>
      <a href="/categories/" class="text-sm font-medium py-2 hover:text-coral transition-colors">Categories</a>
      <a href="#" class="text-sm font-medium py-2 hover:text-coral transition-colors">Deals</a>
      <a href="#" class="text-sm font-medium py-2 hover:text-coral transition-colors">About</a>
    </nav>
    <!-- Mobile search -->
    <div class="mt-3 flex items-center gap-2 px-3 py-2 rounded-full text-sm" style="background:var(--sand); color:var(--muted);">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" placeholder="Search products…" class="bg-transparent outline-none w-full text-sm" style="color:var(--ink);" />
    </div>
  </div>
</header>
