{% load i18n %}

<div class="card relative cursor-pointer group 
    {% if is_large %} col-span-1 row-span-2 {% endif %} 
    rounded-3xl overflow-hidden shadow-md hover:shadow-xl transition-all"
    style="min-height: {% if is_large %}420px{% else %}196px{% endif %};">

  <!-- Background image -->
  <figure class="absolute inset-0 w-full h-full">
    {% if category.image %}
      <img src="{{ category.image }}" alt="{{ category.name }}" class="w-full h-full object-cover" />
    {% else %}
      <div class="w-full h-full flex items-center justify-center bg-base-300">
        <span class="text-base-content/50">{% trans "No Image" %}</span>
      </div>
    {% endif %}
  </figure>

  <!-- Overlay -->
  <div class="absolute inset-0 flex flex-col justify-end p-5 {% if is_large %}p-6{% endif %} bg-leaner-to-t from-base-content/70 to-transparent">
    {% if category.subtitle %}
      <span class="text-white text-xs font-medium tracking-widest uppercase mb-1 opacity-80">
        {{ category.subtitle }}
      </span>
    {% endif %}
    <h3 class="font-display {% if is_large %}text-2xl{% else %}text-xl{% endif %} font-bold text-white mb-3">
      {{ category.name }}
    </h3>
    {% if category.button_text %}
      <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-semibold text-white border border-white/40 backdrop-blur w-fit
                   group-hover:bg-primary group-hover:border-primary transition-all">
        {{ category.button_text }} →
      </span>
    {% endif %}
  </div>

  <!-- Badge -->
  {% if category.badge %}
    <div class="absolute top-4 right-4 w-8 h-8 rounded-full bg-primary flex items-center justify-center">
      <span class="text-white text-xs font-bold">{{ category.badge }}</span>
    </div>
  {% endif %}
</div>
