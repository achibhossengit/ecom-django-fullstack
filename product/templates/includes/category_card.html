<div class="card-lift rounded-3xl overflow-hidden relative cursor-pointer group
    {% if is_large %} col-span-1 row-span-2 {% endif %}" 
    style="min-height: {% if is_large %}420px{% else %}196px{% endif %};">

  <!-- Background image -->
  <div class="w-full h-full absolute inset-0">
    {% if category.image %}
    <img src="{{ category.image }}" alt="{{ category.name }}" class="w-full h-full object-cover">
    {% else %}
    <div class="w-full h-full flex items-center justify-center bg-gray-300">
      <span class="text-gray-500">No Image</span>
    </div>
    {% endif %}
  </div>

  <!-- Overlay -->
  <div class="absolute inset-0 flex flex-col justify-end p-5
       {% if is_large %} p-6 {% endif %}"
       style="background: linear-gradient(to top, rgba(26,18,8,{% if is_large %}0.65{% else %}0.6{% endif %}) 0%, transparent {% if is_large %}60%{% else %}55%{% endif %});">
    {% if category.subtitle %}
    <span class="text-white text-xs font-medium tracking-widest uppercase mb-1 opacity-80">
      {{ category.subtitle }}
    </span>
    {% endif %}
    <h3 class="font-display {% if is_large %}text-2xl{% else %}text-xl{% endif %} font-bold text-white mb-3">
      {{ category.name }}
    </h3>
    {% if category.button_text %}
    <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-semibold text-white border border-white/40 backdrop-blur w-fit
                 group-hover:bg-coral group-hover:border-coral transition-all">
      {{ category.button_text }} →
    </span>
    {% endif %}
  </div>

  {% if category.badge %}
  <div class="absolute top-4 right-4 w-8 h-8 rounded-full bg-coral flex items-center justify-center">
    <span class="text-white text-xs font-bold">{{ category.badge }}</span>
  </div>
  {% endif %}
</div>
